name: test

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install ruff mypy
      - run: ruff check mug tests
      - run: mypy mug

  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install .
      - run: python -m unittest discover -s tests -v
      - run: mug --version

  docker-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install .
      - name: End-to-end workspace + container smoke
        run: |
          set -euo pipefail
          mkdir -p /tmp/mug-smoke/src
          printf 'print("ok")\n' > /tmp/mug-smoke/src/app.py
          mug workspace /tmp/mug-smoke/src -o /tmp/mug-smoke/ws
          test ! -e /tmp/mug-smoke/ws/.git
          mug run /tmp/mug-smoke/ws -- python -c 'print("sandbox-ok")'
          mug diff /tmp/mug-smoke/ws
          mug apply /tmp/mug-smoke/ws --dry-run
          mug doctor /tmp/mug-smoke/src --json | python -c 'import json,sys; d=json.load(sys.stdin); assert "install_hint" in d'
