name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install build
      - run: python -m build
      - name: Package verified source archive
        run: |
          TAG="${GITHUB_REF_NAME}"
          git archive --format=zip --prefix="model-upload-guard-${TAG}/" -o "dist/source.zip" HEAD
          cd dist
          {
            sha256sum *.whl *.tar.gz source.zip 2>/dev/null || true
            echo "$(sha256sum source.zip | awk '{print $1}')  SOURCE_ARCHIVE"
          } > SHA256SUMS.txt
          cat SHA256SUMS.txt
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*
          body: |
            ## Verify install

            ```bash
            curl -fsSL https://raw.githubusercontent.com/Amaraciuri/model-upload-guard/${{ github.ref_name }}/install.sh | MUG_REF=${{ github.ref_name }} bash
            ```

            Or manually:

            ```bash
            curl -fsSL -O https://github.com/Amaraciuri/model-upload-guard/releases/download/${{ github.ref_name }}/source.zip
            curl -fsSL -O https://github.com/Amaraciuri/model-upload-guard/releases/download/${{ github.ref_name }}/SHA256SUMS.txt
            sha256sum -c SHA256SUMS.txt --ignore-missing
            pip install source.zip
            ```

            PyPI publish runs when Trusted Publishing is configured.
          generate_release_notes: true
      - name: Publish to PyPI (Trusted Publishing)
        continue-on-error: true
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
