# Model Upload Guard configuration
# Security defaults are always enforced. Lists below only ADD patterns.

[scan]
max_file_bytes = 1048576
fail_on = "high"
fail_on_unscanned = true
entropy_threshold = 4.5
entropy_min_length = 32

[export]
# Additive only. Immutable secret/credential patterns cannot be removed.
exclude_add = [
  "private/",
  "*.local.json"
]
exclude_remove = []
allow_weaken_defaults = false

[apply]
max_changes = 200
max_delete_ratio = 0.05
protected_add = []
protected_remove = []

[sandbox]
engine = "auto"
# profile = "python-dev"  # default | agent-shell | python-dev | node-dev
image = "python:3.12-alpine"
network = false
memory = "2g"
cpus = "2"
pids_limit = 256
user = "65534:65534"
read_only_root = true
# Writable tmpfs HOME so agent CLIs (config/cache) work as non-root.
home_tmpfs = true
home_size = "512m"
